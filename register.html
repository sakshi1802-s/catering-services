<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaji's Kitchen - Register</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            color: #e67e22;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .logo p {
            color: #666;
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #d35400;
        }

        .switch-auth {
            text-align: center;
            margin-top: 1.5rem;
            color: #555;
        }

        .switch-auth a {
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .switch-auth a:hover {
            color: #d35400;
            text-decoration: underline;
        }

        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            height: 1.2rem;
        }

        .success {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            height: 1.2rem;
        }

        .password-strength {
            margin-top: 0.3rem;
            height: 0.5rem;
            background-color: #eee;
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">
            <h1>Aaji's Kitchen</h1>
            <p>Authentic home-style catering</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
                <div id="username-error" class="error"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <div id="email-error" class="error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
                <div class="password-strength">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <div id="password-error" class="error"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <div id="confirm-error" class="error"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="address">Delivery Address</label>
                <input type="text" id="address" placeholder="Enter your address for deliveries">
            </div>

            <div id="form-error" class="error"></div>
            <div id="form-success" class="success"></div>

            <button type="submit" id="register-btn">Create Account</button>

            <div class="switch-auth">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('register-form');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirm-password');
            const strengthBar = document.getElementById('strength-bar');
            const registerBtn = document.getElementById('register-btn');

            // Password strength indicator
            passwordInput.addEventListener('input', function () {
                const password = passwordInput.value;
                let strength = 0;

                if (password.length >= 8) strength += 1;
                if (password.match(/[a-z]/)) strength += 1;
                if (password.match(/[A-Z]/)) strength += 1;
                if (password.match(/[0-9]/)) strength += 1;
                if (password.match(/[^a-zA-Z0-9]/)) strength += 1;

                // Update strength bar
                const width = (strength / 5) * 100;
                strengthBar.style.width = width + '%';

                // Change color based on strength
                if (strength <= 2) {
                    strengthBar.style.backgroundColor = '#e74c3c';
                } else if (strength <= 4) {
                    strengthBar.style.backgroundColor = '#f39c12';
                } else {
                    strengthBar.style.backgroundColor = '#27ae60';
                }
            });

            // Form submission
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                // Clear previous errors
                document.querySelectorAll('.error').forEach(el => el.textContent = '');
                document.getElementById('form-success').textContent = '';

                // Disable button during submission
                registerBtn.disabled = true;
                registerBtn.textContent = 'Registering...';

                // Get form values
                const formData = {
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: passwordInput.value,
                    phone: document.getElementById('phone').value.trim() || undefined,
                    address: document.getElementById('address').value.trim() || undefined
                };

                // Validation
                let isValid = true;

                if (formData.username.length < 3) {
                    document.getElementById('username-error').textContent = 'Username must be at least 3 characters';
                    isValid = false;
                }

                if (!formData.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                    document.getElementById('email-error').textContent = 'Please enter a valid email';
                    isValid = false;
                }

                if (formData.password.length < 8) {
                    document.getElementById('password-error').textContent = 'Password must be at least 8 characters';
                    isValid = false;
                }

                if (formData.password !== confirmInput.value) {
                    document.getElementById('confirm-error').textContent = 'Passwords do not match';
                    isValid = false;
                }

                if (!isValid) {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                    return;
                }

                // Submit to server
                try {
                    const response = await fetch('http://localhost:3000/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Registration failed');
                    }

                    // Show success message
                    document.getElementById('form-success').textContent = 'Registration successful! Redirecting to login...';

                    // Clear form
                    form.reset();
                    strengthBar.style.width = '0%';

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } catch (error) {
                    console.error('Registration error:', error);

                    // Show appropriate error message
                    let errorMessage = 'Registration failed';
                    if (error.message.includes('already exists')) {
                        if (error.message.includes('Username')) {
                            document.getElementById('username-error').textContent = error.message;
                        } else if (error.message.includes('Email')) {
                            document.getElementById('email-error').textContent = error.message;
                        } else {
                            document.getElementById('form-error').textContent = error.message;
                        }
                    } else if (error.message.includes('Validation failed')) {
                        document.getElementById('form-error').textContent = error.message;
                    } else if (error.message.includes('connect')) {
                        document.getElementById('form-error').textContent = 'Failed to connect to server. Please try again.';
                    } else {
                        document.getElementById('form-error').textContent = error.message || 'Registration failed';
                    }
                } finally {
                    // Re-enable button
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            });

            // Real-time validation as user types
            document.getElementById('username').addEventListener('input', function () {
                if (this.value.trim().length < 3) {
                    document.getElementById('username-error').textContent = 'Username must be at least 3 characters';
                } else {
                    document.getElementById('username-error').textContent = '';
                }
            });

            document.getElementById('email').addEventListener('input', function () {
                if (!this.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                    document.getElementById('email-error').textContent = 'Please enter a valid email';
                } else {
                    document.getElementById('email-error').textContent = '';
                }
            });

            confirmInput.addEventListener('input', function () {
                if (this.value !== passwordInput.value) {
                    document.getElementById('confirm-error').textContent = 'Passwords do not match';
                } else {
                    document.getElementById('confirm-error').textContent = '';
                }
            });
        });
    </script>
</body>

</html>
