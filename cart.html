<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaji's Kitchen - Cart</title>
  <link rel="stylesheet" href="cart-styles.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
  <header class="navbar">
    <div class="logo">
      <img src="../images/logo.jpg" alt="Aaji's Kitchen Logo" class="logo-img">
      <div class="name">
        <span>Aaji's Kitchen</span><br>
        <div class="taste">Taste of home</div>
      </div>
    </div>
    <nav>
      <div class="shift">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/menu">Menu</a></li>
          <li><a href="/aboutUs">About Us</a></li>
        </ul>
      </div>
    </nav>
    <div class="cart-icon">
      <img src="images/cart.png" alt="Cart">
    </div>
  </header>

  <section class="cart-section">
    <h2>Your Cart</h2>
    <table class="cart-table" id="cart-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price (₹)</th>
          <th>Quantity</th>
          <th>Subtotal (₹)</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody id="cart-items"></tbody>
    </table>
    <div class="cart-total" id="cart-total">Total: ₹0</div>

    <div class="user-details">
      <h3>Delivery Details</h3>
      <form id="checkout-form">
        <label for="username">Name:</label>
        <input type="text" id="username" required />

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" required pattern="[0-9]{10}" />

        <label for="address">Address:</label>
        <textarea id="address" rows="3" required></textarea>

        <button type="submit" class="checkout-btn">Place Order</button>
      </form>
    </div>
  </section>

  <!-- Bill Modal -->
  <div id="bill-modal" class="bill-modal">
    <div class="bill-content">
      <span id="close-bill" class="close-btn">&times;</span>
      <div id="bill-details"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Aaji's Kitchen. All rights reserved.</p>
  </footer>

  <script>
    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    const cartTableBody = document.getElementById("cart-items");
    const cartTotalEl = document.getElementById("cart-total");

    function renderCart() {
      cartTableBody.innerHTML = "";
      let totalAmount = 0;

      cartItems.forEach((item, index) => {
        const { name, price, quantity } = item;
        const subtotal = price * quantity;
        totalAmount += subtotal;

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${name}</td>
          <td>${price}</td>
          <td>
            <button class="minus-btn" data-index="${index}">-</button>
            <span class="cart-quantity">${quantity}</span>
            <button class="plus-btn" data-index="${index}">+</button>
          </td>
          <td>${subtotal}</td>
          <td><button class="remove-btn" data-index="${index}">X</button></td>
        `;
        cartTableBody.appendChild(row);
      });

      cartTotalEl.textContent = `Total: ₹${totalAmount}`;
    }

    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("plus-btn")) {
        cartItems[e.target.dataset.index].quantity++;
      } else if (e.target.classList.contains("minus-btn")) {
        let idx = e.target.dataset.index;
        if (cartItems[idx].quantity > 1) cartItems[idx].quantity--;
        else cartItems.splice(idx, 1);
      } else if (e.target.classList.contains("remove-btn")) {
        cartItems.splice(e.target.dataset.index, 1);
      }
      localStorage.setItem("cartItems", JSON.stringify(cartItems));
      renderCart();
    });

    document.getElementById("checkout-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const address = document.getElementById("address").value.trim();

      if (!username || !phone || !address || cartItems.length === 0) {
        alert("Please fill all fields and add items to cart!");
        return;
      }

      // Store cart & time before clearing
      const currentCart = [...cartItems];
      const orderDateTime = new Date().toLocaleString();

      const orderData = { username, phone, address, cartItems };

      try {
        const response = await fetch("http://localhost:3000/submit-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(orderData)
        });

        const result = await response.json();

        if (result.status === "success") {
          alert("Order placed successfully!");
          document.getElementById("checkout-form").reset();

          cartItems = [];
          localStorage.setItem("cartItems", JSON.stringify(cartItems));
          renderCart();

          setTimeout(() => {
            generateBill(currentCart, username, phone, address, orderDateTime);
            document.getElementById("bill-modal").style.display = "flex";
          }, 2000);
        } else {
          alert("Order failed: " + result.message);
        }


      } catch (error) {
        alert("Error connecting to server");
      }
    });

    // Generate Bill
    function generateBill(cart, name, phone, address, dateTime) {
      let billDetailsEl = document.getElementById("bill-details");
      let total = 0;

      let itemsHTML = cart.map(item => {
        let sub = item.price * item.quantity;
        total += sub;
        return `
          <tr>
            <td>${item.name}</td>
            <td>${item.price}</td>
            <td>${item.quantity}</td>
            <td>${sub}</td>
          </tr>
        `;
      }).join("");

      let billHTML = `
        <h2>Order Invoice</h2>
        <p><strong>Date/Time:</strong> ${dateTime}</p>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Address:</strong> ${address}</p>

        <table class="bill-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Price (₹)</th>
              <th>Quantity</th>
              <th>Subtotal (₹)</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHTML}
          </tbody>
        </table>

        <p class="bill-total"><strong>Total:</strong> ₹${total}</p>
      `;

      billDetailsEl.innerHTML = billHTML;
    }

    document.getElementById("close-bill").addEventListener("click", () => {
      document.getElementById("bill-modal").style.display = "none";
    });


    renderCart();
  </script>
</body>

</html>
