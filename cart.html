<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaji's Kitchen - Cart</title>
  <link rel="stylesheet" href="cart-styles.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
  <header class="navbar">
    <div class="logo">
      <img src="../images/logo.jpg" alt="Aaji's Kitchen Logo" class="logo-img">
      <div class="name">
        <span>Aaji's Kitchen</span><br>
        <div class="taste">Taste of home</div>
      </div>
    </div>
    <nav>
      <div class="shift">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/menu">Menu</a></li>
          <li><a href="/aboutUs">About Us</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <section class="cart-section">
    <h2>Your Cart</h2>
    <p id="empty-cart-msg"
      style="color: black; font-weight: bold; text-align: center; margin: 30px auto; font-size: 1.2rem;">No items in
      cart</p>
    <table class="cart-table" id="cart-table">
      <thead id="cart-table-head">
        <tr>
          <th>Item</th>
          <th>Price (₹)</th>
          <th>Quantity</th>
          <th>Subtotal (₹)</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody id="cart-items"></tbody>
    </table>

    <div class="cart-total" id="cart-total">Total: ₹0</div>

    <div class="user-details" id="user-details">
      <h3>Delivery Details</h3>
      <!-- User details will be shown here after login -->
      <div id="user-details-content">
        <!-- User information will be injected here -->
      </div>
    </div>

    <!-- Checkout button to place the order -->
    <button id="checkout-btn" class="checkout-btn">Place Order</button>
  </section>

  <!-- Bill Modal -->
  <div id="bill-modal" class="bill-modal">
    <div class="bill-content">
      <span id="close-bill" class="close-btn">&times;</span>
      <div id="bill-details"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Aaji's Kitchen. All rights reserved.</p>
  </footer>

  <script>
    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    const cartTableBody = document.getElementById("cart-items");
    const cartTotalEl = document.getElementById("cart-total");
    const userDetailsContent = document.getElementById("user-details-content");
    let userToken = localStorage.getItem("userToken"); // Token from localStorage
  
    // Check if user is logged in
    if (!userToken) {
      alert("Oops! Gotta log in first 🚪✨");
      window.location.href = 'login.html';
    } else {
      fetchUserDetails(); // Fetch user details if token exists
    }
  
    // Fetch User Details Function
    async function fetchUserDetails() {
      try {
        const response = await fetch("http://localhost:3000/user-details", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${userToken}`
          }
        });
  
        const result = await response.json();
  
        if (result.status === "success") {
          const { username, phone, address } = result.user;
          userDetailsContent.innerHTML = `
            <p><strong>Name:</strong> ${username}</p>
            <p><strong>Phone:</strong> ${phone}</p>
            <p><strong>Address:</strong> ${address}</p>
          `;
        } else {
          alert("Couldn't fetch user details 🫠");
        }
      } catch (error) {
        console.error("Error fetching user details:", error);
        alert("Error fetching user details 😭");
      }
    }
  
    // Render Cart Items
    function renderCart() {
      const cartTableHead = document.getElementById("cart-table-head");
      const emptyMsg = document.getElementById("empty-cart-msg");
  
      cartTableBody.innerHTML = "";
      let totalAmount = 0;
  
      if (cartItems.length === 0) {
        cartTableHead.style.display = "none";
        cartTableBody.style.display = "none";
        emptyMsg.style.display = "block";
        cartTotalEl.textContent = "Total: ₹0";
        return;
      }
  
      cartTableHead.style.display = "";
      cartTableBody.style.display = "";
      emptyMsg.style.display = "none";
  
      cartItems.forEach((item, index) => {
        const { name, price, quantity } = item;
        const subtotal = price * quantity;
        totalAmount += subtotal;
  
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${name}</td>
          <td>${price}</td>
          <td>
            <button class="minus-btn" data-index="${index}">-</button>
            <span class="cart-quantity">${quantity}</span>
            <button class="plus-btn" data-index="${index}">+</button>
          </td>
          <td>${subtotal}</td>
          <td><button class="remove-btn" data-index="${index}">X</button></td>
        `;
        cartTableBody.appendChild(row);
      });
  
      cartTotalEl.textContent = `Total: ₹${totalAmount}`;
    }
  
    // Handle Cart Updates
    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("plus-btn")) {
        cartItems[e.target.dataset.index].quantity++;
      } else if (e.target.classList.contains("minus-btn")) {
        let idx = e.target.dataset.index;
        if (cartItems[idx].quantity > 1) cartItems[idx].quantity--;
        else cartItems.splice(idx, 1);
      } else if (e.target.classList.contains("remove-btn")) {
        cartItems.splice(e.target.dataset.index, 1);
      }
      localStorage.setItem("cartItems", JSON.stringify(cartItems));
      renderCart();
    });
  
    // Checkout: Place the Order
    document.getElementById("checkout-btn").addEventListener("click", async () => {
      if (cartItems.length === 0) {
        alert("Cart is empty, fam. Go grab some goodies first 🍟🍔");
        return;
      }
  
      if (!userToken) {
        alert("Log in to checkout, queen 👑");
        return;
      }
  
      const currentCart = [...cartItems];
      const orderDateTime = new Date().toLocaleString();
      const orderDetails = { cartItems: currentCart };
  
      try {
        const response = await fetch('http://localhost:3000/submit-order', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${userToken}`
          },
          body: JSON.stringify(orderDetails)
        });
  
        const result = await response.json();
  
        if (result.status === 'success') {
          alert('Order placed! 🎉');
          cartItems = [];
          localStorage.setItem("cartItems", JSON.stringify(cartItems));
          renderCart();
  
          setTimeout(() => {
            generateBill(currentCart, orderDateTime);
            document.getElementById("bill-modal").style.display = "flex";
          }, 1500);
  
        } else {
          alert('Failed to place order 😔: ' + result.message);
        }
      } catch (error) {
        console.error('Order error:', error);
        alert('Something went wrong 🫠 Try again later.');
      }
    });
  
    // Generate Bill Function
    function generateBill(cart, dateTime) {
      let billDetailsEl = document.getElementById("bill-details");
      let total = 0;
  
      let itemsHTML = cart.map(item => {
        let sub = item.price * item.quantity;
        total += sub;
        return `
          <tr>
            <td>${item.name}</td>
            <td>${item.price}</td>
            <td>${item.quantity}</td>
            <td>${sub}</td>
          </tr>
        `;
      }).join("");
  
      let billHTML = `
        <h2>Order Invoice</h2>
        <p><strong>Date/Time:</strong> ${dateTime}</p>
        <table class="bill-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Price (₹)</th>
              <th>Quantity</th>
              <th>Subtotal (₹)</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHTML}
          </tbody>
        </table>
        <p class="bill-total"><strong>Total:</strong> ₹${total}</p>
      `;
  
      billDetailsEl.innerHTML = billHTML;
    }
  
    // Close the Bill Modal
    document.getElementById("close-bill").addEventListener("click", () => {
      document.getElementById("bill-modal").style.display = "none";
    });
  
    // Initial Render
    document.addEventListener("DOMContentLoaded", () => {
      fetchUserDetails();
      renderCart();
    });
  </script>
  
</body>

</html>
